<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abhyasam Flashcards</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="/css/flashcard.css">
</head>
<body>
  <div id="particles"></div>
  <div class="flashcard-container">
    <div class="header">
      <h1><i class="fas fa-layer-group"></i> Abhyasam Flashcards</h1>
      <p id="page-title-display">Loading flashcards...</p>
    </div>
    
    <main>
      <div id="loading" class="loading hidden">
        <i class="fas fa-spinner fa-spin"></i> Processing...
      </div>

      <div class="flashcard-viewer hidden" id="flashcard-viewer">
        <div class="flashcard-scene" onclick="toggleFlip()">
          <div class="flashcard" id="active-flashcard">
            <div class="flashcard-face flashcard-front">
              <div class="flashcard-content" id="flashcard-front-content">Front</div>
            </div>
            <div class="flashcard-face flashcard-back">
              <div class="flashcard-content" id="flashcard-back-content">Back</div>
            </div>
          </div>
        </div>
        
        <div class="controls">
          <button id="prev-btn" class="action-btn" onclick="prevCard()"><i class="fas fa-arrow-left"></i> Prev</button>
          <span id="flashcard-counter" class="counter">1 / 10</span>
          <button id="next-btn" class="action-btn" onclick="nextCard()">Next <i class="fas fa-arrow-right"></i></button>
        </div>
      </div>
      
      <div class="navigation">
        <a href="/index.html" class="action-btn"><i class="fas fa-home"></i> Home</a>
        <a href="/quiz.html" class="action-btn"><i class="fas fa-question-circle"></i> Quiz</a>
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script src="/js/flashcards.js"></script>
</body>
</html>
